  <style>
    .glass-card { background: rgba(30,41,59,0.5); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.5); transition: all 0.3s ease; }
    .glass-card:hover { border-color: rgba(255,255,255,0.2); box-shadow: 0 12px 40px rgba(0,0,0,0.6); transform: translateY(-2px); }
    .glass-header { background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .glass-modal { background: rgba(15,23,42,0.8); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 24px 48px rgba(0,0,0,0.6); }
    .glass-input { background: rgba(15,23,42,0.5); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08); transition: border-color 0.2s, box-shadow 0.2s; }
    .glass-input:focus { border-color: rgba(59,130,246,0.5); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .glass-btn { background: rgba(59,130,246,0.25); backdrop-filter: blur(8px); border: 1px solid rgba(59,130,246,0.3); color: #f1f5f9; transition: all 0.2s ease; }
    .glass-btn:hover:not(:disabled) { background: rgba(59,130,246,0.4); border-color: rgba(59,130,246,0.5); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(59,130,246,0.2); }
    .glass-btn-secondary { background: rgba(51,65,85,0.3); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08); color: #f1f5f9; transition: all 0.2s ease; }
    .glass-btn-secondary:hover:not(:disabled) { background: rgba(51,65,85,0.5); border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .modal-overlay { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
    .spinner { border: 3px solid #1e293b; border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    .modal-animate { animation: fadeIn 0.2s ease-out; }
    .iframe-immersive { animation: fadeIn 0.3s ease-out; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; }

<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  // ---- DÉCODE LES ENTITÉS HTML ----
  var decodeEntities = function(str) {
    if (!str) return "";
    try {
      var txt = document.createElement('textarea');
      txt.innerHTML = str;
      return txt.value;
    } catch (e) {
      return str;
    }
  };

  // ---- TEXTES STATIQUES (tous en entités HTML) ----
  var TEXTS = {
    appTitle: "SOG - March&eacute;",
    welcome: "Bienvenue sur SOG",
    welcomeDesc: "Connectez-vous ou inscrivez-vous pour acc&eacute;der &agrave; toutes les boutiques du march&eacute;.",
    login: "Connexion",
    register: "Inscription",
    logout: "D&eacute;connexion",
    connectedAs: "Connect&eacute; en tant que",
    shopsTitle: "Nos boutiques",
    visit: "Visiter",
    vendor: "Vendeur",
    back: "← Retour",
    connectToOrder: "Connectez-vous pour commander",
    loginModalTitle: "Connexion",
    email: "Email",
    password: "Mot de passe",
    loginBtn: "Se connecter",
    registerModalTitle: "Inscription",
    name: "Nom complet",
    phone: "T&eacute;l&eacute;phone",
    address: "Adresse",
    addressOptional: "Adresse (facultatif)",
    registerBtn: "S'inscrire",
    cancel: "Annuler",
    ordersTitle: "Historique des commandes",
    noOrders: "Aucune commande pour le moment",
    orderDate: "Commande du",
    status: "Statut",
    total: "Total",
    rating: "Noter",
    adminPanel: "Administration",
    users: "Gestion des utilisateurs",
    stats: "Statistiques",
    usersCount: "Utilisateurs",
    ordersCount: "Commandes",
    shopsCount: "Boutiques",
    admin: "Admin",
    addAdmin: "Ajouter",
    removeAdmin: "Retirer",
    ratingTitle: "Noter {vendor}",
    ratingLabel: "Note",
    ratingComment: "Votre commentaire (facultatif)",
    ratingSubmit: "Envoyer la note",
    close: "Fermer",
    loading: "Chargement...",
    loginSuccess: "Connexion r&eacute;ussie",
    registerSuccess: "Inscription r&eacute;ussie",
    logoutSuccess: "D&eacute;connect&eacute;",
    loginError: "Erreur de connexion",
    registerError: "Erreur d'inscription",
    userNotFound: "Utilisateur non trouv&eacute;",
    wrongPassword: "Mot de passe incorrect",
    invalidEmail: "Email invalide",
    tooManyRequests: "Trop de tentatives, r&eacute;essayez plus tard",
    emailAlreadyUsed: "Cet email est d&eacute;j&agrave; utilis&eacute;",
    weakPassword: "Mot de passe trop faible (6 caract&egrave;res minimum)",
    operationNotAllowed: "L'inscription par email est d&eacute;sactiv&eacute;e dans Firebase Console !",
    fillFields: "Veuillez remplir tous les champs",
    guest: "Invité",
    connected: "Connecté",
    shop: "Boutique",
    ratingCount: "avis",
    ratingSuccess: "Merci pour votre note !",
    ratingError: "Erreur lors de la notation",
    orderConfirmed: "Confirm&eacute;e",
    vendorOrdersTitle: "Mes commandes",
    pending: "En attente",
    preparing: "En pr&eacute;paration",
    ready: "Pr&ecirc;te",
    picked: "Retir&eacute;e",
    allStatus: "Toutes",
    filterPending: "En attente",
    filterPreparing: "En pr&eacute;paration",
    filterReady: "Pr&ecirc;tes",
    filterPicked: "Retir&eacute;es",
    noVendorOrders: "Aucune commande pour le moment.",
    orderFrom: "Commande du",
    customer: "Client",
    comments: "Remarque",
    btnPrepare: "Pr&eacute;parer",
    btnReady: "Pr&ecirc;te",
    btnPicked: "Retir&eacute;e",
    notificationReady: "Votre commande chez {vendor} est pr&ecirc;te !",
    vendorPanel: "Mes commandes",
    vendorManagement: "Gestion des vendeurs",
    addVendor: "Ajouter un vendeur",
    vendorName: "Nom du vendeur",
    vendorEmail: "Email du vendeur",
    addVendorBtn: "Ajouter le vendeur",
    vendorEmailHint: "L'email doit correspondre à un compte Firebase existant.",
    noVendors: "Aucun vendeur enregistr&eacute;.",
    deleteVendor: "Supprimer",
    vendorAdded: "Vendeur ajouté avec succès !",
    vendorDeleted: "Vendeur supprimé",
    vendorNotFound: "Cet email n'existe pas dans Firebase. Le vendeur doit d'abord se connecter à SOG.",
    fillAllFields: "Veuillez remplir tous les champs"
  };

  // ---- FIREBASE INIT ----
  var firebaseConfig = {
    apiKey: "AIzaSyCegKjHSw2DzF1zcBVdG6iZyGK2P3ig1rM",
    authDomain: "sog-hanout.firebaseapp.com",
    projectId: "sog-hanout",
    storageBucket: "sog-hanout.firebasestorage.app",
    messagingSenderId: "108437302312",
    appId: "1:108437302312:web:9faa1f7084e5797cf9591d",
    measurementId: "G-V1VFE9YDE3",
    databaseURL: "https://sog-hanout-default-rtdb.europe-west1.firebasedatabase.app/"
  };
  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  var db = firebase.database();

  var cleanUserData = function(userData) {
    if (!userData) return null;
    var cleaned = { ...userData };
    Object.keys(cleaned).forEach(function(key) {
      if (typeof cleaned[key] === 'string') {
        cleaned[key] = decodeEntities(cleaned[key]);
      }
    });
    return cleaned;
  };

  function App() {
    // ---- ÉTATS EXISTANTS ----
    var [user, setUser] = useState(null);
    var [loading, setLoading] = useState(true);
    var [shops, setShops] = useState([]);
    var [selectedShop, setSelectedShop] = useState(null);
    var [showLogin, setShowLogin] = useState(false);
    var [showRegister, setShowRegister] = useState(false);
    var [loginForm, setLoginForm] = useState({ email: "", password: "" });
    var [registerForm, setRegisterForm] = useState({
      name: "", email: "", password: "", phone: "", address: ""
    });
    var [msg, setMsg] = useState({ text: "", type: "" });
    var [isProcessing, setIsProcessing] = useState(false);
    var [activeTab, setActiveTab] = useState('shops');
    var [orders, setOrders] = useState([]);
    var [ratings, setRatings] = useState({});
    var [users, setUsers] = useState([]);
    var [showRatingModal, setShowRatingModal] = useState(false);
    var [ratingForm, setRatingForm] = useState({ vendor: "", rating: 5, comment: "" });
    var [isAdmin, setIsAdmin] = useState(false);
    var iframeRef = useRef(null);
    var SHOPS_URL = "https://raw.githubusercontent.com/mekeirish/sog/main/shops.json";

    // ---- ÉTATS VENDEUR ----
    var [isVendor, setIsVendor] = useState(false);
    var [vendorName, setVendorName] = useState(null);
    var [vendorOrders, setVendorOrders] = useState([]);
    var [filterStatus, setFilterStatus] = useState('all');

    // ---- ÉTATS GESTION DES VENDEURS (admin) ----
    var [vendors, setVendors] = useState([]);
    var [newVendorName, setNewVendorName] = useState('');
    var [newVendorEmail, setNewVendorEmail] = useState('');
    var [isAddingVendor, setIsAddingVendor] = useState(false);

    // ---- AUTH FIREBASE ----
    useEffect(function() {
      var unsubscribe = auth.onAuthStateChanged(async function(firebaseUser) {
        if (firebaseUser) {
          var userData = {
            uid: firebaseUser.uid,
            email: firebaseUser.email,
            name: firebaseUser.displayName || firebaseUser.email?.split('@')[0] || "Client",
            phone: firebaseUser.phoneNumber || "",
            address: "",
          };
          try {
            var snapshot = await db.ref('users/' + firebaseUser.uid).once('value');
            var extraData = snapshot.val();
            if (extraData) {
              userData.name = extraData.name || userData.name;
              userData.phone = extraData.phone || "";
              userData.address = extraData.address || "";
            }
          } catch (e) { /* ignore */ }
          var cleanedUser = cleanUserData(userData);
          setUser(cleanedUser);
          sendAuthToIframe(cleanedUser);
          checkIfAdmin(firebaseUser.uid);
          checkVendor(firebaseUser.uid);
          loadOrders();
        } else {
          setUser(null);
          sendAuthToIframe(null);
          setIsAdmin(false);
          setIsVendor(false);
          setVendorName(null);
          setVendorOrders([]);
          setOrders([]);
        }
        setLoading(false);
        loadShops();
      });
      return function() { unsubscribe(); };
    }, []);

    // ---- CHECK ADMIN ----
    var checkIfAdmin = function(uid) {
      db.ref('admins').once('value').then(function(snapshot) {
        var adminList = snapshot.val() || [];
        if (Array.isArray(adminList) && adminList.includes(uid)) {
          setIsAdmin(true);
          loadVendors(); // Charger les vendeurs si admin
        }
      }).catch(function(err) { console.error(err); });
    };

    // ---- CHECK VENDEUR ----
    var checkVendor = function(uid) {
      db.ref('vendors').once('value').then(function(snapshot) {
        var vendors = snapshot.val() || {};
        for (var key in vendors) {
          if (vendors[key].uid === uid) {
            setVendorName(key);
            setIsVendor(true);
            loadVendorOrders(key);
            break;
          }
        }
      }).catch(function(err) { console.error(err); });
    };

    // ---- CHARGEMENT DES BOUTIQUES ----
    var loadShops = async function() {
      try {
        var res = await fetch(SHOPS_URL);
        if (res.ok) {
          var data = await res.json();
          setShops(data);
          data.forEach(function(shop) { loadRatings(shop.vendor); });
        } else {
          setShops([
            { vendor: "milo", name: "Milo", url: "https://mekeirish.github.io/hanout-milo/" },
            { vendor: "tartiza", name: "Tartiza", url: "https://mekeirish.github.io/hanout-tartiza/" },
            { vendor: "baginjaxy", name: "Baginjaxy", url: "https://mekeirish.github.io/hanout-baginjaxy/" }
          ]);
        }
      } catch (e) {
        setShops([
          { vendor: "milo", name: "Milo", url: "https://mekeirish.github.io/hanout-milo/" },
          { vendor: "tartiza", name: "Tartiza", url: "https://mekeirish.github.io/hanout-tartiza/" },
          { vendor: "baginjaxy", name: "Baginjaxy", url: "https://mekeirish.github.io/hanout-baginjaxy/" }
        ]);
      }
    };

    // ---- AUTH HANDLERS ----
    var handleLogin = async function(e) {
      e.preventDefault();
      setMsg({ text: "", type: "" });
      setIsProcessing(true);
      try {
        if (!loginForm.email.trim() || !loginForm.password.trim()) {
          throw new Error(TEXTS.fillFields);
        }
        await auth.signInWithEmailAndPassword(loginForm.email, loginForm.password);
        setShowLogin(false);
        setLoginForm({ email: "", password: "" });
        setMsg({ text: TEXTS.loginSuccess, type: "success" });
      } catch (error) {
        var errorMsg = TEXTS.loginError;
        if (error.code === 'auth/user-not-found') errorMsg = TEXTS.userNotFound;
        else if (error.code === 'auth/wrong-password') errorMsg = TEXTS.wrongPassword;
        else if (error.code === 'auth/invalid-email') errorMsg = TEXTS.invalidEmail;
        else if (error.code === 'auth/too-many-requests') errorMsg = TEXTS.tooManyRequests;
        else if (error.message) errorMsg = "❌ " + error.message;
        setMsg({ text: errorMsg, type: "error" });
      }
      setIsProcessing(false);
    };

    var handleRegister = async function(e) {
      e.preventDefault();
      setMsg({ text: "", type: "" });
      setIsProcessing(true);
      try {
        if (!registerForm.name.trim()) throw new Error("Le nom est requis");
        if (!registerForm.email.trim()) throw new Error("L'email est requis");
        if (registerForm.password.length < 6) throw new Error(TEXTS.weakPassword);

        var userCredential = await auth.createUserWithEmailAndPassword(
          registerForm.email,
          registerForm.password
        );
        await userCredential.user.updateProfile({ displayName: registerForm.name });
        await db.ref('users/' + userCredential.user.uid).set({
          name: registerForm.name,
          email: registerForm.email,
          phone: registerForm.phone || "",
          address: registerForm.address || "",
          createdAt: new Date().toISOString()
        });
        setShowRegister(false);
        setRegisterForm({ name: "", email: "", password: "", phone: "", address: "" });
        setMsg({ text: TEXTS.registerSuccess, type: "success" });
      } catch (error) {
        var errorMsg = TEXTS.registerError;
        if (error.code === 'auth/email-already-in-use') errorMsg = TEXTS.emailAlreadyUsed;
        else if (error.code === 'auth/weak-password') errorMsg = TEXTS.weakPassword;
        else if (error.code === 'auth/invalid-email') errorMsg = TEXTS.invalidEmail;
        else if (error.code === 'auth/operation-not-allowed') errorMsg = TEXTS.operationNotAllowed;
        else if (error.message) errorMsg = "❌ " + error.message;
        setMsg({ text: errorMsg, type: "error" });
      }
      setIsProcessing(false);
    };

    var handleLogout = async function() {
      try {
        await auth.signOut();
        setSelectedShop(null);
        setMsg({ text: TEXTS.logoutSuccess, type: "info" });
      } catch (error) {
        setMsg({ text: "❌ Erreur lors de la d&eacute;connexion", type: "error" });
      }
    };

    // ---- IFRAME COMMUNICATION ----
    var sendAuthToIframe = function(userData) {
      if (iframeRef.current) {
        iframeRef.current.contentWindow.postMessage({
          type: 'SOG_AUTH',
          payload: { user: userData }
        }, '*');
      }
    };
    var handleIframeLoad = function() { sendAuthToIframe(user); };

    // ---- ORDRES (CLIENT) ----
    useEffect(function() {
      var handleOrder = function(event) {
        if (event.data.type === 'SOG_ORDER') {
          saveOrder(event.data.payload);
        }
        // ---- NOUVEAU : Recharger l'historique client ----
        if (event.data.type === 'SOG_ORDER_SAVED') {
          console.log('🔄 Rechargement des commandes client');
          loadOrders();
        }
      };
      window.addEventListener('message', handleOrder);
      return function() { window.removeEventListener('message', handleOrder); };
    }, []);

    var saveOrder = function(orderData) {
      if (!user) return;
      var newOrderRef = db.ref('orders').push();
      newOrderRef.set({
        userId: user.uid,
        vendor: orderData.vendor,
        items: orderData.items,
        total: orderData.total,
        currency: orderData.currency || "DZD",
        status: 'pending',
        createdAt: new Date().toISOString(),
        customerName: orderData.customerName || user.name,
        customerPhone: orderData.customerPhone || user.phone,
        customerAddress: orderData.customerAddress || user.address,
        comments: orderData.comments || ""
      }).then(function() {
        setMsg({ text: "✅ Commande sauvegard&eacute;e dans l'historique", type: "success" });
        loadOrders();
        if (isVendor && vendorName) loadVendorOrders(vendorName);
      }).catch(function(err) { console.error(err); });
    };

    var loadOrders = function() {
      if (!user) return;
      db.ref('orders').orderByChild('userId').equalTo(user.uid).on('value', function(snapshot) {
        var data = snapshot.val();
        if (data) {
          var orderList = Object.keys(data).map(function(key) {
            return { id: key, ...data[key] };
          });
          orderList.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
          setOrders(orderList);
        } else {
          setOrders([]);
        }
      });
    };

    // ---- ORDRES (VENDEUR) ----
    var loadVendorOrders = function(vendor) {
      db.ref('orders').orderByChild('vendor').equalTo(vendor).on('value', function(snapshot) {
        var data = snapshot.val();
        if (data) {
          var list = Object.keys(data).map(function(key) {
            return { id: key, ...data[key] };
          });
          list.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
          setVendorOrders(list);
        } else {
          setVendorOrders([]);
        }
      });
    };

    var updateOrderStatus = function(orderId, newStatus) {
      db.ref('orders/' + orderId).update({ status: newStatus }).then(function() {
        if (vendorName) loadVendorOrders(vendorName);
        var order = vendorOrders.find(function(o) { return o.id === orderId; });
        if (newStatus === 'ready' && order) {
          sendNotificationToCustomer(order);
        }
        setMsg({ text: "Statut mis à jour", type: "success" });
      });
    };

    var sendNotificationToCustomer = function(order) {
      var message = decodeEntities(TEXTS.notificationReady).replace('{vendor}', order.vendor);
      var topic = order.vendor + '_orders';
      fetch('https://ntfy.sh/' + topic, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          topic: topic,
          title: 'Commande prête',
          message: message,
          priority: 5,
          click: window.location.href
        })
      }).catch(console.error);
    };

    // ---- RATINGS ----
    var loadRatings = function(vendor) {
      db.ref('ratings/' + vendor).on('value', function(snapshot) {
        var data = snapshot.val();
        setRatings(function(prev) { return { ...prev, [vendor]: data || {} }; });
      });
    };
    var submitRating = async function(e) {
      e.preventDefault();
      if (!user) { alert("Connectez-vous pour noter"); return; }
      try {
        await db.ref('ratings/' + ratingForm.vendor + '/' + user.uid).set({
          rating: ratingForm.rating,
          comment: ratingForm.comment || "",
          createdAt: new Date().toISOString(),
          userName: user.name
        });
        setShowRatingModal(false);
        setRatingForm({ vendor: "", rating: 5, comment: "" });
        setMsg({ text: TEXTS.ratingSuccess, type: "success" });
      } catch (error) {
        setMsg({ text: TEXTS.ratingError, type: "error" });
      }
    };
    var getAverageRating = function(vendor) {
      var vendorRatings = ratings[vendor] || {};
      var values = Object.values(vendorRatings);
      if (values.length === 0) return 0;
      var sum = values.reduce(function(acc, r) { return acc + (r.rating || 0); }, 0);
      return (sum / values.length).toFixed(1);
    };
    var getRatingCount = function(vendor) {
      var vendorRatings = ratings[vendor] || {};
      return Object.keys(vendorRatings).length;
    };

    // ---- ADMIN (utilisateurs) ----
    var loadUsers = function() {
      db.ref('users').on('value', function(snapshot) {
        var data = snapshot.val();
        if (data) {
          var userList = Object.keys(data).map(function(key) {
            return { uid: key, ...data[key] };
          });
          db.ref('admins').once('value').then(function(adminSnapshot) {
            var adminList = adminSnapshot.val() || [];
            userList.forEach(function(u) { u.isAdmin = adminList.includes(u.uid); });
            setUsers(userList);
          });
        } else {
          setUsers([]);
        }
      });
    };
    var toggleAdmin = async function(uid, isAdminNow) {
      try {
        var adminsRef = db.ref('admins');
        var snapshot = await adminsRef.once('value');
        var adminList = snapshot.val() || [];
        if (isAdminNow) {
          adminList = adminList.filter(function(id) { return id !== uid; });
        } else {
          if (!adminList.includes(uid)) adminList.push(uid);
        }
        await adminsRef.set(adminList);
        setMsg({ text: "✅ Statut admin mis &agrave; jour", type: "success" });
        loadUsers();
      } catch (error) {
        setMsg({ text: "❌ Erreur lors de la mise &agrave; jour", type: "error" });
      }
    };

    // ---- GESTION DES VENDEURS (admin) ----
    var loadVendors = function() {
      db.ref('vendors').on('value', function(snapshot) {
        var data = snapshot.val();
        if (data) {
          var vendorList = Object.keys(data).map(function(key) {
            return { name: key, ...data[key] };
          });
          setVendors(vendorList);
        } else {
          setVendors([]);
        }
      });
    };

    var addVendor = async function() {
      if (!newVendorName.trim() || !newVendorEmail.trim()) {
        setMsg({ text: decodeEntities(TEXTS.fillAllFields), type: "error" });
        return;
      }

      setIsAddingVendor(true);
      try {
        var usersRef = db.ref('users');
        var snapshot = await usersRef.once('value');
        var users = snapshot.val() || {};
        
        var foundUid = null;
        for (var uid in users) {
          if (users[uid].email === newVendorEmail.trim()) {
            foundUid = uid;
            break;
          }
        }

        if (!foundUid) {
          setMsg({ 
            text: decodeEntities(TEXTS.vendorNotFound), 
            type: "error" 
          });
          setIsAddingVendor(false);
          return;
        }

        var vendorRef = db.ref('vendors/' + newVendorName.trim().toLowerCase());
        await vendorRef.set({
          uid: foundUid,
          name: newVendorName.trim(),
          email: newVendorEmail.trim(),
          createdAt: new Date().toISOString()
        });

        setMsg({ text: decodeEntities(TEXTS.vendorAdded), type: "success" });
        setNewVendorName('');
        setNewVendorEmail('');
        loadVendors();

      } catch (error) {
        setMsg({ text: "❌ Erreur: " + error.message, type: "error" });
      }
      setIsAddingVendor(false);
    };

    var deleteVendor = function(vendorName) {
      if (!confirm("Supprimer le vendeur " + vendorName + " ?")) return;
      db.ref('vendors/' + vendorName).remove().then(function() {
        setMsg({ text: decodeEntities(TEXTS.vendorDeleted), type: "success" });
        loadVendors();
      });
    };

    // ---- SELECTION BOUTIQUE ----
    var selectShop = function(shop) {
      setSelectedShop(shop);
      loadRatings(shop.vendor);
    };
    var closeShop = function() { setSelectedShop(null); };

    // ---- RENDU ----
    if (loading) {
      return (
        <div className="min-h-screen flex items-center justify-center bg-slate-900">
          <div className="spinner"></div>
        </div>
      );
    }

    var t = function(key) {
      return decodeEntities(TEXTS[key] || key);
    };

    // ---- MODE IMMERSIF ----
    if (selectedShop) {
      return (
        <div className="fixed inset-0 z-50 h-screen w-screen overflow-hidden bg-black iframe-immersive">
          <iframe
            ref={iframeRef}
            key={selectedShop.vendor}
            src={selectedShop.url}
            title={selectedShop.name}
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
            loading="lazy"
            onLoad={handleIframeLoad}
            className="w-full h-full border-0"
          />
          <button
            onClick={closeShop}
            className="fixed top-4 left-4 z-[60] glass-btn px-4 py-2 rounded-xl text-sm font-medium shadow-lg"
          >
            {t('back')}
          </button>
        </div>
      );
    }

    // ---- MODE NORMAL ----
    return (
      <div className="min-h-screen bg-slate-900 text-white p-4">

        <header className="glass-header sticky top-0 z-30 px-4 py-3 rounded-xl">
          <div className="flex flex-wrap items-center justify-between">
            <h1 className="text-xl font-bold text-white">{t('appTitle')}</h1>
            <div className="flex gap-2 items-center flex-wrap">
              {user ? (
                <>
                  <span className="text-sm hidden sm:inline text-gray-300">👤 {decodeEntities(user.name)}</span>
                  {isAdmin && <span className="text-xs bg-purple-900/40 text-purple-200 px-2 py-1 rounded-full">👑 Admin</span>}
                  {isVendor && <span className="text-xs bg-emerald-900/40 text-emerald-200 px-2 py-1 rounded-full">🏪 {vendorName}</span>}
                  {activeTab === 'orders' ? (
                    <button onClick={function() { setActiveTab('shops'); setSelectedShop(null); }} className="glass-btn-secondary px-4 py-2 rounded-xl text-sm font-medium">{t('shopsTitle')}</button>
                  ) : (
                    <button onClick={function() { setActiveTab('orders'); }} className="glass-btn-secondary px-4 py-2 rounded-xl text-sm font-medium">{t('ordersTitle')}</button>
                  )}
                  {isAdmin && (
                    <>
                      <button onClick={function() { loadUsers(); setActiveTab('admin'); }} className="glass-btn-secondary px-4 py-2 rounded-xl text-sm font-medium">{t('adminPanel')}</button>
                      <button onClick={function() { loadVendors(); setActiveTab('vendor-management'); }} className="glass-btn-secondary px-4 py-2 rounded-xl text-sm font-medium">👥 Vendeurs</button>
                    </>
                  )}
                  {isVendor && (
                    <button onClick={function() { setActiveTab('vendor-orders'); }} className="glass-btn-secondary px-4 py-2 rounded-xl text-sm font-medium">
                      📦 {t('vendorPanel')}
                    </button>
                  )}
                  <button onClick={handleLogout} className="glass-btn-secondary px-4 py-2 rounded-xl text-sm font-medium">{t('logout')}</button>
                </>
              ) : (
                <>
                  <button onClick={function() { setShowLogin(true); }} className="glass-btn px-4 py-2 rounded-xl text-sm font-medium">{t('login')}</button>
                  <button onClick={function() { setShowRegister(true); }} className="glass-btn-secondary px-4 py-2 rounded-xl text-sm font-medium">{t('register')}</button>
                </>
              )}
            </div>
          </div>
        </header>

        {msg.text && (
          <div className={'mt-4 p-3 glass-alert rounded-xl border text-sm ' + (msg.type === 'success' ? 'bg-emerald-900/20 border-emerald-700/30 text-emerald-200' : msg.type === 'error' ? 'bg-red-900/20 border-red-700/30 text-red-200' : 'bg-blue-900/20 border-blue-700/30 text-blue-200')}>
            {decodeEntities(msg.text)}
          </div>
        )}

        <div className="max-w-7xl mx-auto mt-6">

          {/* ---- ONGLET HISTORIQUE CLIENT ---- */}
          {user && activeTab === 'orders' && (
            <div>
              <h2 className="text-2xl font-bold text-white mb-4">{t('ordersTitle')}</h2>
              {orders.length === 0 ? (
                <div className="glass-card p-8 text-center rounded-2xl"><p className="text-gray-400">{t('noOrders')}</p></div>
              ) : (
                <div className="space-y-4">
                  {orders.map(function(order) {
                    var statusLabels = {
                      pending: 'En attente',
                      preparing: 'En pr&eacute;paration',
                      ready: 'Pr&ecirc;te',
                      picked: 'Retir&eacute;e'
                    };
                    var statusColors = {
                      pending: 'bg-yellow-900/40 text-yellow-200',
                      preparing: 'bg-blue-900/40 text-blue-200',
                      ready: 'bg-emerald-900/40 text-emerald-200',
                      picked: 'bg-gray-700/40 text-gray-400'
                    };
                    return (
                      <div key={order.id} className="glass-card p-4 rounded-2xl">
                        <div className="flex justify-between items-start flex-wrap">
                          <div>
                            <p className="text-sm text-gray-400">{t('orderDate')} {new Date(order.createdAt).toLocaleDateString('fr-FR')}</p>
                            <p className="font-semibold">{t('shop')} : {decodeEntities(order.vendor)}</p>
                            <p className="text-sm text-gray-300">{t('status')} : <span className={'inline-block px-2 py-0.5 rounded-full text-xs ' + statusColors[order.status]}>{decodeEntities(statusLabels[order.status])}</span></p>
                            <div className="mt-2 text-sm">
                              {order.items && order.items.map(function(item, idx) {
                                return <div key={idx} className="text-gray-300">• {decodeEntities(item.name)} × {item.quantity} → {(item.price * item.quantity).toFixed(2)} {order.currency}</div>;
                              })}
                            </div>
                          </div>
                          <div className="text-right">
                            <p className="text-xl font-bold text-blue-400">{order.total} {order.currency}</p>
                            <button onClick={function() { setRatingForm({ vendor: order.vendor, rating: 5, comment: "" }); setShowRatingModal(true); }} className="glass-btn px-4 py-2 rounded-xl text-sm font-medium mt-2">⭐ {t('rating')}</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              <button onClick={function() { setActiveTab('shops'); }} className="glass-btn-secondary px-4 py-2 rounded-xl text-sm font-medium mt-4">{t('back')}</button>
            </div>
          )}

          {/* ---- ONGLET ADMIN (utilisateurs) ---- */}
          {user && activeTab === 'admin' && isAdmin && (
            <div>
              <h2 className="text-2xl font-bold text-white mb-4">{t('adminPanel')}</h2>
              <div className="glass-card p-6 rounded-2xl mb-6">
                <h3 className="font-semibold text-white mb-3">{t('stats')}</h3>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                  <div className="bg-white/5 p-4 rounded-xl border border-white/10"><p className="text-gray-400 text-sm">{t('usersCount')}</p><p className="text-2xl font-bold text-white">{users.length}</p></div>
                  <div className="bg-white/5 p-4 rounded-xl border border-white/10"><p className="text-gray-400 text-sm">{t('ordersCount')}</p><p className="text-2xl font-bold text-white">{orders.length}</p></div>
                  <div className="bg-white/5 p-4 rounded-xl border border-white/10"><p className="text-gray-400 text-sm">{t('shopsCount')}</p><p className="text-2xl font-bold text-white">{shops.length}</p></div>
                </div>
              </div>
              <div className="glass-card p-6 rounded-2xl">
                <h3 className="font-semibold text-white mb-3">{t('users')}</h3>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead><tr className="text-gray-400 border-b border-white/10"><th className="text-left py-2">{t('name')}</th><th className="text-left py-2">Email</th><th className="text-left py-2">{t('phone')}</th><th className="text-left py-2">{t('admin')}</th></tr></thead>
                    <tbody>
                      {users.map(function(u) {
                        return (
                          <tr key={u.uid} className="border-b border-white/5">
                            <td className="py-2">{decodeEntities(u.name || u.email)}</td>
                            <td className="py-2">{decodeEntities(u.email)}</td>
                            <td className="py-2">{decodeEntities(u.phone || "-")}</td>
                            <td className="py-2">
                              <button onClick={function() { toggleAdmin(u.uid, u.isAdmin || false); }} className={'text-xs px-2 py-1 rounded ' + (u.isAdmin ? 'bg-purple-900/40 text-purple-200' : 'bg-white/5 text-gray-400 border border-white/10')}>
                                {u.isAdmin ? '👑 Admin' : 'Ajouter'}
                              </button>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
              <button onClick={function() { setActiveTab('shops'); }} className="glass-btn-secondary px-4 py-2 rounded-xl text-sm font-medium mt-4">{t('back')}</button>
            </div>
          )}

          {/* ---- ONGLET GESTION DES VENDEURS (admin) ---- */}
          {user && activeTab === 'vendor-management' && isAdmin && (
            <div>
              <h2 className="text-2xl font-bold text-white mb-4">👥 {t('vendorManagement')}</h2>
              
              <div className="glass-card p-6 rounded-2xl mb-6">
                <h3 className="font-semibold text-white mb-3">{t('addVendor')}</h3>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                  <input
                    type="text"
                    value={newVendorName}
                    onChange={(e) => setNewVendorName(e.target.value)}
                    placeholder={t('vendorName') + " (ex: milo)"}
                    className="glass-input w-full px-4 py-2 rounded-xl text-white focus:ring-2 focus:ring-blue-500/50 outline-none"
                  />
                  <input
                    type="email"
                    value={newVendorEmail}
                    onChange={(e) => setNewVendorEmail(e.target.value)}
                    placeholder={t('vendorEmail')}
                    className="glass-input w-full px-4 py-2 rounded-xl text-white focus:ring-2 focus:ring-blue-500/50 outline-none"
                  />
                  <button
                    onClick={addVendor}
                    disabled={isAddingVendor}
                    className="glass-btn px-4 py-2 rounded-xl text-sm font-medium"
                  >
                    {isAddingVendor ? '⏳ Ajout...' : '✅ ' + t('addVendorBtn')}
                  </button>
                </div>
                <p className="text-xs text-gray-400 mt-2">{t('vendorEmailHint')}</p>
              </div>

              <div className="glass-card p-6 rounded-2xl">
                <h3 className="font-semibold text-white mb-3">Vendeurs enregistrés</h3>
                {vendors.length === 0 ? (
                  <p className="text-gray-400 text-sm text-center py-4">{t('noVendors')}</p>
                ) : (
                  <div className="space-y-2">
                    {vendors.map(function(v) {
                      return (
                        <div key={v.name} className="flex items-center justify-between p-3 rounded-xl bg-white/5 border border-white/10">
                          <div>
                            <span className="text-white font-medium">{decodeEntities(v.name)}</span>
                            <span className="text-gray-400 text-sm ml-3">{decodeEntities(v.email)}</span>
                            <span className="text-gray-500 text-xs ml-3">UID: {v.uid?.substring(0, 8)}...</span>
                          </div>
                          <button
                            onClick={() => deleteVendor(v.name)}
                            className="text-red-400 hover:text-red-300 text-sm px-2 py-1 rounded bg-white/5"
                          >
                            {t('deleteVendor')}
                          </button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>

              <button onClick={function() { setActiveTab('shops'); }} className="glass-btn-secondary px-4 py-2 rounded-xl text-sm font-medium mt-4">{t('back')}</button>
            </div>
          )}

          {/* ---- ONGLET MES COMMANDES (VENDEUR) ---- */}
          {user && activeTab === 'vendor-orders' && isVendor && (
            <div>
              <h2 className="text-2xl font-bold text-white mb-4">📦 {t('vendorOrdersTitle')}</h2>
              <div className="flex flex-wrap gap-2 mb-4">
                <button onClick={() => setFilterStatus('all')} className={'glass-btn-secondary px-4 py-2 rounded-xl text-sm ' + (filterStatus === 'all' ? 'bg-blue-900/40 border-blue-500' : '')}>{t('allStatus')}</button>
                <button onClick={() => setFilterStatus('pending')} className={'glass-btn-secondary px-4 py-2 rounded-xl text-sm ' + (filterStatus === 'pending' ? 'bg-yellow-900/40 border-yellow-500' : '')}>{t('filterPending')}</button>
                <button onClick={() => setFilterStatus('preparing')} className={'glass-btn-secondary px-4 py-2 rounded-xl text-sm ' + (filterStatus === 'preparing' ? 'bg-blue-900/40 border-blue-500' : '')}>{t('filterPreparing')}</button>
                <button onClick={() => setFilterStatus('ready')} className={'glass-btn-secondary px-4 py-2 rounded-xl text-sm ' + (filterStatus === 'ready' ? 'bg-emerald-900/40 border-emerald-500' : '')}>{t('filterReady')}</button>
                <button onClick={() => setFilterStatus('picked')} className={'glass-btn-secondary px-4 py-2 rounded-xl text-sm ' + (filterStatus === 'picked' ? 'bg-gray-700/40 border-gray-500' : '')}>{t('filterPicked')}</button>
              </div>

              {vendorOrders.length === 0 ? (
                <div className="glass-card p-8 text-center rounded-2xl"><p className="text-gray-400">{t('noVendorOrders')}</p></div>
              ) : (
                <div className="space-y-4">
                  {vendorOrders.filter(function(order) {
                    if (filterStatus === 'all') return true;
                    return order.status === filterStatus;
                  }).map(function(order) {
                    var statusColors = {
                      pending: 'bg-yellow-900/40 text-yellow-200',
                      preparing: 'bg-blue-900/40 text-blue-200',
                      ready: 'bg-emerald-900/40 text-emerald-200',
                      picked: 'bg-gray-700/40 text-gray-400'
                    };
                    var statusLabels = {
                      pending: t('pending'),
                      preparing: t('preparing'),
                      ready: t('ready'),
                      picked: t('picked')
                    };
                    return (
                      <div key={order.id} className="glass-card p-4 rounded-2xl">
                        <div className="flex flex-wrap justify-between items-start gap-2">
                          <div>
                            <p className="text-sm text-gray-400">{t('orderFrom')} {new Date(order.createdAt).toLocaleDateString('fr-FR')} à {new Date(order.createdAt).toLocaleTimeString('fr-FR')}</p>
                            <p className="font-semibold text-white">{decodeEntities(order.customerName)}</p>
                            <p className="text-sm text-gray-300">📞 {decodeEntities(order.customerPhone)}</p>
                            <p className="text-sm text-gray-300">📍 {decodeEntities(order.customerAddress)}</p>
                            <div className="mt-2 text-sm">
                              {order.items && order.items.map(function(item, idx) {
                                return <div key={idx} className="text-gray-300">• {decodeEntities(item.name)} × {item.quantity} → {(item.price * item.quantity).toFixed(2)} {order.currency}</div>;
                              })}
                            </div>
                            {order.comments && (
                              <p className="text-sm text-gray-400 mt-1">💬 {decodeEntities(order.comments)}</p>
                            )}
                          </div>
                          <div className="text-right">
                            <p className="text-xl font-bold text-blue-400">{order.total} {order.currency}</p>
                            <span className={'inline-block px-3 py-1 rounded-full text-xs font-medium mt-1 ' + statusColors[order.status]}>
                              {statusLabels[order.status]}
                            </span>
                            <div className="flex flex-col gap-1 mt-2">
                              {order.status === 'pending' && (
                                <button onClick={() => updateOrderStatus(order.id, 'preparing')} className="glass-btn px-3 py-1 rounded text-sm">⚡ {t('btnPrepare')}</button>
                              )}
                              {order.status === 'preparing' && (
                                <button onClick={() => updateOrderStatus(order.id, 'ready')} className="glass-btn px-3 py-1 rounded text-sm">✅ {t('btnReady')}</button>
                              )}
                              {order.status === 'ready' && (
                                <button onClick={() => updateOrderStatus(order.id, 'picked')} className="glass-btn-secondary px-3 py-1 rounded text-sm">📦 {t('btnPicked')}</button>
                              )}
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              <button onClick={function() { setActiveTab('shops'); }} className="glass-btn-secondary px-4 py-2 rounded-xl text-sm font-medium mt-4">{t('back')}</button>
            </div>
          )}

          {/* ---- LISTE DES BOUTIQUES (par défaut) ---- */}
          {activeTab === 'shops' && (
            <div>
              <h2 className="text-2xl font-bold text-white mb-6">{t('shopsTitle')}</h2>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                {shops.map(function(shop) {
                  var avgRating = getAverageRating(shop.vendor);
                  var ratingCount = getRatingCount(shop.vendor);
                  return (
                    <div key={shop.vendor} className="glass-card p-6 rounded-2xl cursor-pointer hover:scale-[1.02] transition-all" onClick={function() { selectShop(shop); }}>
                      <h3 className="text-xl font-semibold text-white">{decodeEntities(shop.name)}</h3>
                      <p className="text-sm text-gray-400 mt-1">{t('vendor')} : {decodeEntities(shop.vendor)}</p>
                      <div className="flex items-center gap-2 mt-2">
                        <span className="text-yellow-400">⭐</span>
                        <span className="text-white">{avgRating || "—"}</span>
                        <span className="text-gray-400 text-sm">({ratingCount} {t('ratingCount')})</span>
                      </div>
                      <button className="glass-btn w-full mt-4 py-2 rounded-xl text-sm font-medium">{t('visit')}</button>
                    </div>
                  );
                })}
              </div>
              <div className="mt-8 text-center text-gray-400 text-sm">{!user ? t('welcomeDesc') : ""}</div>
            </div>
          )}

        </div>

        {/* ---- MODALS ---- */}
        {showLogin && (
          <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4 modal-animate" onClick={function() { setShowLogin(false); }}>
            <div className="glass-modal max-w-md w-full p-6 rounded-2xl shadow-2xl" onClick={function(e) { e.stopPropagation(); }}>
              <h3 className="text-xl font-bold text-white mb-4">{t('loginModalTitle')}</h3>
              <form onSubmit={handleLogin} className="space-y-4">
                <input type="email" placeholder={t('email')} className="glass-input w-full px-4 py-2 rounded-xl text-white focus:ring-2 focus:ring-blue-500/50 outline-none" value={loginForm.email} onChange={function(e) { setLoginForm({ email: e.target.value, password: loginForm.password }); }} required />
                <input type="password" placeholder={t('password')} className="glass-input w-full px-4 py-2 rounded-xl text-white focus:ring-2 focus:ring-blue-500/50 outline-none" value={loginForm.password} onChange={function(e) { setLoginForm({ email: loginForm.email, password: e.target.value }); }} required />
                <button type="submit" className="glass-btn w-full py-2 rounded-xl font-medium" disabled={isProcessing}>{isProcessing ? 'Connexion...' : t('loginBtn')}</button>
              </form>
              <div className="mt-4 text-right"><button onClick={function() { setShowLogin(false); }} className="text-gray-400 hover:text-white text-sm">{t('cancel')}</button></div>
            </div>
          </div>
        )}

        {showRegister && (
          <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4 modal-animate" onClick={function() { setShowRegister(false); }}>
            <div className="glass-modal max-w-md w-full p-6 rounded-2xl shadow-2xl" onClick={function(e) { e.stopPropagation(); }}>
              <h3 className="text-xl font-bold text-white mb-4">{t('registerModalTitle')}</h3>
              <form onSubmit={handleRegister} className="space-y-3">
                <input type="text" placeholder={t('name')} className="glass-input w-full px-4 py-2 rounded-xl text-white focus:ring-2 focus:ring-blue-500/50 outline-none" value={registerForm.name} onChange={function(e) { setRegisterForm({ ...registerForm, name: e.target.value }); }} required />
                <input type="email" placeholder={t('email')} className="glass-input w-full px-4 py-2 rounded-xl text-white focus:ring-2 focus:ring-blue-500/50 outline-none" value={registerForm.email} onChange={function(e) { setRegisterForm({ ...registerForm, email: e.target.value }); }} required />
                <input type="password" placeholder={t('password') + " (6 caractères min)"} className="glass-input w-full px-4 py-2 rounded-xl text-white focus:ring-2 focus:ring-blue-500/50 outline-none" value={registerForm.password} onChange={function(e) { setRegisterForm({ ...registerForm, password: e.target.value }); }} required minLength="6" />
                <input type="tel" placeholder={t('phone')} className="glass-input w-full px-4 py-2 rounded-xl text-white focus:ring-2 focus:ring-blue-500/50 outline-none" value={registerForm.phone} onChange={function(e) { setRegisterForm({ ...registerForm, phone: e.target.value }); }} />
                <input type="text" placeholder={t('addressOptional')} className="glass-input w-full px-4 py-2 rounded-xl text-white focus:ring-2 focus:ring-blue-500/50 outline-none" value={registerForm.address} onChange={function(e) { setRegisterForm({ ...registerForm, address: e.target.value }); }} />
                <button type="submit" className="glass-btn w-full py-2 rounded-xl font-medium" disabled={isProcessing}>{isProcessing ? 'Inscription...' : t('registerBtn')}</button>
              </form>
              <div className="mt-4 text-right"><button onClick={function() { setShowRegister(false); }} className="text-gray-400 hover:text-white text-sm">{t('cancel')}</button></div>
            </div>
          </div>
        )}

        {showRatingModal && (
          <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50 p-4 modal-animate" onClick={function() { setShowRatingModal(false); }}>
            <div className="glass-modal max-w-md w-full p-6 rounded-2xl shadow-2xl" onClick={function(e) { e.stopPropagation(); }}>
              <h3 className="text-xl font-bold text-white mb-4">{t('ratingTitle').replace('{vendor}', decodeEntities(ratingForm.vendor))}</h3>
              <form onSubmit={submitRating} className="space-y-4">
                <div>
                  <label className="block text-gray-300 mb-2">{t('ratingLabel')}</label>
                  <div className="flex gap-2">
                    {[1, 2, 3, 4, 5].map(function(star) {
                      return <button key={star} type="button" onClick={function() { setRatingForm({ ...ratingForm, rating: star }); }} className={'text-3xl transition-colors ' + (star <= ratingForm.rating ? 'text-yellow-400' : 'text-gray-600 hover:text-gray-400')}>★</button>;
                    })}
                  </div>
                </div>
                <textarea placeholder={t('ratingComment')} className="glass-input w-full px-4 py-2 rounded-xl text-white focus:ring-2 focus:ring-blue-500/50 outline-none resize-y" rows="3" value={ratingForm.comment} onChange={function(e) { setRatingForm({ ...ratingForm, comment: e.target.value }); }} />
                <button type="submit" className="glass-btn w-full py-2 rounded-xl font-medium">{t('ratingSubmit')}</button>
              </form>
              <div className="mt-4 text-right"><button onClick={function() { setShowRatingModal(false); }} className="text-gray-400 hover:text-white text-sm">{t('cancel')}</button></div>
            </div>
          </div>
        )}

      </div>
    );
  }

  var container = document.getElementById('root');
  var root = ReactDOM.createRoot(container);
  root.render(React.createElement(App, null));
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>
</body>
</html>
